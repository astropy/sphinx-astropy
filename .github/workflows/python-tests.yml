name: Run unit tests

on:
  pull_request:
  push:
    branches: [ main ]
    tags:
      - "*"
  workflow_dispatch:
  schedule:
    # Run every Sunday at 03:53 UTC
    - cron: 53 2 * * 0

permissions: {}

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
            toxenv: py310-test-sphinx_oldest

          - os: windows-latest
            python-version: "3.10"
            toxenv: py310-test-sphinx53

          - os: macos-latest
            python-version: "3.10"
            toxenv: py310-test-sphinx62

          - os: ubuntu-latest
            python-version: "3.11"
            toxenv: py311-test-sphinx70

          - os: windows-latest
            python-version: "3.11"
            toxenv: py311-test-v2deps-sphinx71

          - os: macos-latest
            python-version: "3.11"
            toxenv: py311-test-sphinx72

          - os: ubuntu-latest
            python-version: "3.12"
            toxenv: py312-test-v2deps-sphinx80

          - os: windows-latest
            python-version: "3.12"
            toxenv: py312-test-sphinx81

          - os: ubuntu-latest
            python-version: "3.13"
            toxenv: py313-test-sphinx82

          - os: ubuntu-latest
            python-version: "3.14"
            toxenv: py314-test-sphinx90

          - os: ubuntu-latest
            python-version: "3.14"
            toxenv: py314-test-sphinx91

          - os: macos-latest
            python-version: "3.14"
            toxenv: py314-test-v2deps-sphinxdev

          - os: ubuntu-latest
            python-version: "3.14"
            toxenv: py314-test-v3deps-sphinx91

          - os: ubuntu-latest
            python-version: "3.13"
            toxenv: py313-test-v3deps-sphinx82

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Tox
      run: python -m pip install tox

    - name: Run Tox
      run: tox -v -e ${{ matrix.toxenv }}
